services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

  nct:
    build:
      context: .
      dockerfile: nct/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - BLOCK_SIZE=5
      - BLOCK_TIMEOUT=30
      - DIFFICULTY=4
      - NONCE_SPACE=1000000000
      - PORT=8080
      - LOG_FILE=/var/log/nct.log

  pool-a:
    build:
      context: .
      dockerfile: pool/Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - POOL_ID=pool-a
      - POOL_WORKER_COUNT=2
      - HEALTH_PORT=8090
      - LOG_FILE=/var/log/pool-a.log

  worker-a1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - MINER_BINARY=python3 /app/miner/cpu_miner.py
      - WORKER_ID=worker-a1
      - POOL_ID=pool-a
      - HEARTBEAT_INTERVAL=5
      - HEALTH_PORT=8081
      - LOG_FILE=/var/log/worker-a1.log

  worker-a2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "8082:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - MINER_BINARY=python3 /app/miner/cpu_miner.py
      - WORKER_ID=worker-a2
      - POOL_ID=pool-a
      - HEARTBEAT_INTERVAL=5
      - HEALTH_PORT=8081
      - LOG_FILE=/var/log/worker-a2.log

volumes:
  redis_data:
